<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Discord Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 480px;
    height: 120px;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }

  .panel {
    position: relative;
    width: 480px;
    height: 120px;
    padding: 14px 20px 14px 18px;
    background: rgba(8, 0, 20, 0.88);
    border: 1px solid #7b2fff;
    border-top: 2px solid #b44fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
  }

  .panel::before {
    content: '';
    position: absolute;
    top: -1px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #7b2fff 20%, #c966ff 50%, #7b2fff 80%, transparent);
  }

  .header {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .discord-icon {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    fill: #c966ff;
  }

  .header-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.22em;
    color: #c966ff;
    text-transform: uppercase;
    flex: 1;
  }

  /* Live member count badge */
  .member-count {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: #a899cc;
    letter-spacing: 0.08em;
  }

  .count-number {
    color: #ffffff;
    font-size: 12px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #7b2fff;
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px #7b2fff; }
    50%       { opacity: 0.3; box-shadow: none; }
  }

  .divider {
    position: absolute;
    left: 18px; right: 18px;
    top: 46px;
    height: 1px;
    background: linear-gradient(90deg, #7b2fff, rgba(123,47,255,0.15));
  }

  .message {
    font-size: 13px;
    line-height: 1.5;
    color: #d8c8ff;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .message span.label {
    color: #a899cc;
    font-size: 12px;
  }

  .username {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.1em;
    border: 1px solid rgba(180, 79, 255, 0.7);
    padding: 3px 12px;
    background: rgba(123, 47, 255, 0.2);
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%);
    white-space: nowrap;
  }

  .corner-dot {
    position: absolute;
    bottom: 12px;
    right: 16px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #7b2fff;
    animation: pulse 2s ease-in-out infinite;
  }
</style>
</head>
<body>
<div class="panel">
  <div class="header">
    <svg class="discord-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.032.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
    </svg>
    <span class="header-label">Join the Discord</span>
    <div class="member-count">
      <div class="live-dot"></div>
      <span class="count-number" id="memberCount">...</span>
      <span>members</span>
    </div>
  </div>
  <div class="divider"></div>
  <div class="message">
    <span class="label">Send me a friend request →</span>
    <span class="username">pagoni_hax</span>
  </div>
  <div class="corner-dot"></div>
</div>

<script>
  async function fetchMemberCount() {
    try {
      const res = await fetch('/api/discord');
      const data = await res.json();
      const count = data.members;
      document.getElementById('memberCount').textContent = count.toLocaleString();
    } catch (e) {
      document.getElementById('memberCount').textContent = '--';
    }
  }

  fetchMemberCount();
  // Refresh every 5 minutes
  setInterval(fetchMemberCount, 5 * 60 * 1000);
</script>
</body>
</html>
